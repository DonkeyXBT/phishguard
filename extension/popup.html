<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #f0f2f5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      background: #161b27;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #dc2626, #991b1b);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(220,38,38,0.4);
    }
    .header-title { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
    .header-sub   { font-size: 10.5px; color: #6b7280; margin-top: 1px; }

    .gear-btn {
      background: none; border: none; cursor: pointer;
      color: #4b5563; padding: 6px; border-radius: 7px;
      font-size: 15px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .gear-btn:hover { color: #e5e7eb; background: rgba(255,255,255,0.07); }

    /* ── Status area ─────────────────────────────────────────────────────── */
    #status-section { padding: 14px; }

    /* Not on email page */
    .not-email {
      text-align: center;
      padding: 28px 16px;
      color: #4b5563;
    }
    .not-email .icon { font-size: 36px; margin-bottom: 10px; }
    .not-email .title { font-size: 13px; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    .not-email .msg { font-size: 11.5px; color: #4b5563; line-height: 1.55; }

    /* Scanning state */
    #scanning-msg {
      display: none;
      padding: 28px 16px;
      text-align: center;
    }
    .scan-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(59,130,246,0.15);
      border-top-color: #3b82f6;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .scan-label { font-size: 12px; color: #6b7280; }

    /* ── Risk card ───────────────────────────────────────────────────────── */
    .risk-card {
      border-radius: 12px;
      padding: 14px;
      border: 1px solid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .risk-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
    }
    .risk-card.low      { background: #071a10; border-color: #14532d33; }
    .risk-card.medium   { background: #1a1200; border-color: #78350f33; }
    .risk-card.high     { background: #180d04; border-color: #7c2d1233; }
    .risk-card.critical { background: #170606; border-color: #7f1d1d33; }
    .risk-card.scanning { background: #131924; border-color: #1e2d4033; }

    .risk-card.low::before      { background: linear-gradient(90deg, #22c55e, #16a34a); }
    .risk-card.medium::before   { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .risk-card.high::before     { background: linear-gradient(90deg, #f97316, #ea580c); }
    .risk-card.critical::before { background: linear-gradient(90deg, #ef4444, #dc2626); }

    /* Risk top row */
    .risk-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .risk-left { display: flex; align-items: center; gap: 9px; }
    .risk-icon { font-size: 22px; }
    .risk-level-label {
      font-weight: 700;
      font-size: 14.5px;
      letter-spacing: -0.01em;
    }
    .risk-level-label.low      { color: #4ade80; }
    .risk-level-label.medium   { color: #fbbf24; }
    .risk-level-label.high     { color: #fb923c; }
    .risk-level-label.critical { color: #f87171; }
    .risk-level-label.scanning { color: #475569; }

    .risk-score-badge {
      display: inline-flex;
      align-items: baseline;
      gap: 2px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .risk-score-badge .num { font-size: 18px; line-height: 1; }
    .risk-score-badge .denom { font-size: 10px; opacity: 0.65; }
    .low    .risk-score-badge { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .medium .risk-score-badge { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .high   .risk-score-badge { background: rgba(251,146,60,0.15); color: #fb923c; }
    .critical .risk-score-badge { background: rgba(248,113,113,0.15); color: #f87171; }

    /* Progress bar */
    .risk-bar-track {
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .risk-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .low    .risk-bar-fill { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .medium .risk-bar-fill { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .high   .risk-bar-fill { background: linear-gradient(90deg, #f97316, #fb923c); }
    .critical .risk-bar-fill { background: linear-gradient(90deg, #ef4444, #f87171); }

    /* Signal chips */
    .signals-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .signal-chip {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 10.5px;
      color: #cbd5e1;
      font-weight: 500;
    }

    /* Summary */
    .summary-text {
      font-size: 11.5px;
      color: #64748b;
      line-height: 1.5;
    }

    /* ── Report button ────────────────────────────────────────────────────── */
    .btn-report {
      width: 100%;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 10px rgba(220,38,38,0.3);
    }
    .btn-report:hover:not(:disabled) {
      background: linear-gradient(135deg, #b91c1c, #991b1b);
      box-shadow: 0 4px 16px rgba(220,38,38,0.4);
      transform: translateY(-1px);
    }
    .btn-report:active:not(:disabled) { transform: translateY(0); }
    .btn-report:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
    .btn-report.reported {
      background: linear-gradient(135deg, #15803d, #166534);
      box-shadow: 0 2px 10px rgba(21,128,61,0.3);
      cursor: default;
      transform: none;
    }

    /* ── Connection bar ───────────────────────────────────────────────────── */
    .conn-bar {
      padding: 7px 14px;
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #4b5563;
      background: #0d1018;
    }
    .conn-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .conn-dot.ok      { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
    .conn-dot.err     { background: #ef4444; box-shadow: 0 0 5px #ef444488; }
    .conn-dot.loading { background: #f59e0b; animation: pg-blink 1s ease-in-out infinite; }
    @keyframes pg-blink { 0%,100% { opacity:0.4; } 50% { opacity:1; } }

    /* ── Settings panel ───────────────────────────────────────────────────── */
    #settings-section {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 14px;
      background: #0d1018;
    }
    #settings-section.open { display: block; }

    .settings-title {
      font-size: 10px; font-weight: 600; color: #4b5563;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .field-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }

    input {
      width: 100%;
      background: #161b27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 7px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 11.5px;
      outline: none;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #374151; }

    .btn-save {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }
    .btn-save:hover { background: #1d4ed8; }

    .saved-msg {
      font-size: 11px; color: #22c55e; margin-top: 6px;
      display: none; text-align: center; font-weight: 500;
    }

    /* ── Divider ─────────────────────────────────────────────────────────── */
    .divider { height: 1px; background: rgba(255,255,255,0.04); margin: 0 14px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🛡️</div>
      <div>
        <div class="header-title">PhishGuard</div>
        <div class="header-sub">Email Security</div>
      </div>
    </div>
    <button class="gear-btn" id="gearBtn" title="Settings">⚙️</button>
  </div>

  <!-- Main content -->
  <div id="status-section">

    <!-- Not on an email page -->
    <div class="not-email" id="not-email-msg" style="display:none">
      <div class="icon">📧</div>
      <div class="title">No email open</div>
      <div class="msg">Open an email in Gmail or Outlook<br>to see the phishing risk analysis.</div>
    </div>

    <!-- Scanning spinner -->
    <div id="scanning-msg">
      <div class="scan-spinner"></div>
      <div class="scan-label">Analyzing email...</div>
    </div>

    <!-- Scan result -->
    <div id="scan-result" style="display:none">
      <div class="risk-card scanning" id="risk-card">
        <div class="risk-top">
          <div class="risk-left">
            <span class="risk-icon" id="risk-icon">🔍</span>
            <span class="risk-level-label scanning" id="risk-label">Scanning...</span>
          </div>
          <div class="risk-score-badge" id="risk-badge">
            <span class="num" id="risk-score">—</span>
            <span class="denom">/100</span>
          </div>
        </div>
        <div class="risk-bar-track">
          <div class="risk-bar-fill" id="risk-bar" style="width:0%"></div>
        </div>
        <div class="signals-wrap" id="signals-preview"></div>
        <div class="summary-text" id="summary-text"></div>
      </div>

      <button class="btn-report" id="reportBtn">
        🚩 Report as Phishing
      </button>
    </div>

  </div>

  <!-- Connection bar -->
  <div class="conn-bar">
    <span class="conn-dot loading" id="connDot"></span>
    <span id="connText">Checking connection...</span>
  </div>

  <!-- Settings panel -->
  <div id="settings-section">
    <div class="settings-title">Configuration</div>
    <div class="field-label">Server URL</div>
    <input type="url" id="apiUrl" placeholder="https://your-phishguard.vercel.app" />
    <div class="field-label">API Key</div>
    <input type="text" id="apiKey" placeholder="Organization API key" />
    <button class="btn-save" id="saveBtn">Save Settings</button>
    <div class="saved-msg" id="savedMsg">✓ Settings saved</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
