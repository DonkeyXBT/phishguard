<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #111827;
      color: #f9fafb;
    }
    .header {
      background: #1f2937;
      border-bottom: 1px solid #374151;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: #dc2626;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .header-title { font-weight: 700; font-size: 15px; }
    .header-sub { font-size: 11px; color: #9ca3af; }
    .section { padding: 14px 16px; border-bottom: 1px solid #1f2937; }
    .label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 7px 10px;
      color: #f9fafb;
      font-size: 12px;
      outline: none;
      font-family: monospace;
    }
    input:focus { border-color: #3b82f6; }
    .save-btn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .save-btn:hover { background: #1d4ed8; }
    .status { font-size: 11px; color: #10b981; margin-top: 6px; display: none; }
    .footer {
      padding: 12px 16px;
      text-align: center;
    }
    .admin-link {
      display: inline-block;
      background: #374151;
      color: #d1d5db;
      text-decoration: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 500;
    }
    .admin-link:hover { background: #4b5563; color: white; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡️</div>
    <div>
      <div class="header-title">PhishGuard</div>
      <div class="header-sub">Phishing Detection</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Server URL</div>
    <input type="url" id="apiUrl" placeholder="http://localhost:8000" />
  </div>

  <div class="section">
    <div class="label">API Key</div>
    <input type="text" id="apiKey" placeholder="Your organization API key" />
    <button class="save-btn" id="saveBtn">Save Settings</button>
    <div class="status" id="savedStatus">✅ Settings saved</div>
  </div>

  <div class="footer">
    <a href="#" class="admin-link" id="adminLink">Open Admin Console →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
