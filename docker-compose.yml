version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: phishguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/phishguard
      DIRECT_URL: postgresql://postgres:postgres@db:5432/phishguard
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      NODE_ENV: production
      # Optional integrations (set in .env):
      # ALERT_WEBHOOK_URL=https://hooks.slack.com/...
      # ALERT_EMAIL_TO=security@company.com
      # SMTP_HOST=smtp.example.com
      # SMTP_PORT=587
      # SMTP_USER=...
      # SMTP_PASS=...
      # VIRUSTOTAL_API_KEY=...
      # PHISH_MODEL_PATH=/app/data/model.json
    volumes:
      - app_data:/app/data

volumes:
  pgdata:
  app_data:
